{{- if .Values.operators.postgres.enabled }}
---
# ClusterRole for lab-postgres
# Needs: core Lab CRDs (watch), postgres.lab.inklogic.tech (full), secrets, batch/jobs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lab-postgres
  labels:
    {{- include "lab-operators.labels" . | nindent 4 }}
    app.kubernetes.io/name: lab-postgres
rules:
  # Core Lab CRDs — read org membership and resource specs
  - apiGroups: ["lab.inklogic.tech"]
    resources:
      - organizations
      - teams
      - members
      - accounts
      - firefighters
    verbs: ["get", "list", "watch", "update", "patch"]

  # Postgres provider and tech CRDs — full ownership
  - apiGroups: ["postgres.lab.inklogic.tech"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # S3 ObjectStore CRD
  - apiGroups: ["s3.lab.inklogic.tech"]
    resources: ["objectstores"]
    verbs: ["get", "list", "watch"]

  # Kubernetes Jobs — create backup/restore jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Secrets — reading DB credentials and provider config
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # ConfigMaps — operator configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}
