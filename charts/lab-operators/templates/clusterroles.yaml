{{/*
clusterroles.yaml — ClusterRole for each enabled operator.
*/}}

{{- if .Values.operators.kubernetes.enabled }}
---
# ClusterRole for lab-kubernetes
# Needs broad access: core lab.inklogic.tech CRDs, shadow CRDs, Fleet, Rancher, core K8s resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lab-kubernetes
  labels:
    {{- include "lab-operators.labels" . | nindent 4 }}
    app.kubernetes.io/name: lab-kubernetes
rules:
  # Core Lab CRDs — watch + finalizer management
  - apiGroups: ["lab.inklogic.tech"]
    resources:
      - organizations
      - organizationprimers
      - accounts
      - teams
      - members
      - products
      - firefighters
      - clouds
      - environments
      - zones
      - deploymenttargets
    verbs: ["get", "list", "watch", "update", "patch"]

  # Shadow CRDs owned by the Kubernetes operator
  - apiGroups: ["kubernetes.lab.inklogic.tech"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Tech provider CRDs watched by this operator
  - apiGroups: ["kubernetes.lab.inklogic.tech", "postgres.lab.inklogic.tech"]
    resources: ["clusters", "postgres"]
    verbs: ["get", "list", "watch"]

  # Fleet resources
  - apiGroups: ["fleet.cattle.io"]
    resources:
      - bundles
      - gitrepos
      - bundlenamespacemappings
      - clusters
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Rancher management resources
  - apiGroups: ["management.cattle.io"]
    resources:
      - projects
      - projectroletemplatebindings
      - roletemplates
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # Core Kubernetes resources
  - apiGroups: [""]
    resources: ["namespaces", "secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}

{{- if .Values.operators.github.enabled }}
---
# ClusterRole for lab-github
# Needs: core lab.inklogic.tech CRDs (watch + finalizer), github.lab.inklogic.tech (full), secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lab-github
  labels:
    {{- include "lab-operators.labels" . | nindent 4 }}
    app.kubernetes.io/name: lab-github
rules:
  # Core Lab CRDs — watch + finalizer management
  - apiGroups: ["lab.inklogic.tech"]
    resources:
      - organizations
      - accounts
      - teams
      - members
      - products
      - firefighters
    verbs: ["get", "list", "watch", "update", "patch"]

  # Github provider CRD — full access (owned by this operator)
  - apiGroups: ["github.lab.inklogic.tech"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Secrets — reading GitHub credentials and provider config
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]

  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}

