{{- if .Values.operators.lab.enabled }}
---
# ClusterRole for lab
# Needs: all Core lab.inklogic.tech CRDs (watch + finalizer patch + status update),
#        unified Shadow CRD (list/delete for aggregation), OperatorRegistration (watch-only).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lab
  labels:
    {{- include "lab-operators.labels" . | nindent 4 }}
    app.kubernetes.io/name: lab
rules:
  # Core Lab CRDs — watch + finalizer patch (EntityFinalizerAttacher, legacy cleanup)
  - apiGroups: ["lab.inklogic.tech"]
    resources:
      - organizations
      - organizationprimers
      - accounts
      - teams
      - members
      - products
      - firefighters
      - clouds
      - environments
      - zones
      - deploymenttargets
    verbs: ["get", "list", "watch", "patch"]

  # OrganizationPrimer delete — Lab initiates deletion once all shadows are Ready
  - apiGroups: ["lab.inklogic.tech"]
    resources: ["organizationprimers"]
    verbs: ["delete"]

  # Core CRD status subresource — required for status aggregation writes
  - apiGroups: ["lab.inklogic.tech"]
    resources:
      - organizations/status
      - organizationprimers/status
      - accounts/status
      - teams/status
      - members/status
      - products/status
      - firefighters/status
      - clouds/status
      - environments/status
      - zones/status
      - deploymenttargets/status
    verbs: ["update"]

  # Unified Shadow CRD — list/delete for aggregation (tech operators create/update shadows)
  - apiGroups: ["lab.inklogic.tech"]
    resources: ["shadows"]
    verbs: ["get", "list", "watch", "delete"]

  # OperatorRegistration — watch-only (tech operators bootstrap registrations)
  - apiGroups: ["lab.inklogic.tech"]
    resources: ["operatorregistrations"]
    verbs: ["get", "list", "watch"]

  # KubeOps leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}

{{- if .Values.operators.postgres.enabled }}
---
# ClusterRole for lab-postgres
# Needs: core Lab CRDs (read-only watch), postgres.lab.inklogic.tech typed shadows + tech CRDs,
#        CNPG clusters, secrets, batch/jobs, namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lab-postgres
  labels:
    {{- include "lab-operators.labels" . | nindent 4 }}
    app.kubernetes.io/name: lab-postgres
rules:
  # Core Lab CRDs — read-only watch (UseReadOnlyCoreWatch)
  - apiGroups: ["lab.inklogic.tech"]
    resources:
      - organizations
      - teams
      - accounts
      - firefighters
    verbs: ["get", "list", "watch"]

  # Postgres provider CRD — targeted get (PostgresProviderContextResolver; not watched)
  - apiGroups: ["postgres.lab.inklogic.tech"]
    resources: ["postgres"]
    verbs: ["get"]

  # Postgres tech CRDs — read-only watch (KubeOps informers + cluster list)
  - apiGroups: ["postgres.lab.inklogic.tech"]
    resources:
      - clusters
      - databases
    verbs: ["get", "list", "watch"]

  # Backups — watch + status phase updates (BackupPostgresController)
  - apiGroups: ["postgres.lab.inklogic.tech"]
    resources: ["backups"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["postgres.lab.inklogic.tech"]
    resources: ["backups/status"]
    verbs: ["update"]

  # Restores — watch + self-delete + status phase updates (RestorePostgresController)
  - apiGroups: ["postgres.lab.inklogic.tech"]
    resources: ["restores"]
    verbs: ["get", "list", "watch", "delete"]

  - apiGroups: ["postgres.lab.inklogic.tech"]
    resources: ["restores/status"]
    verbs: ["update"]

  # Typed Postgres shadow CRDs — get/create via PostgresShadowHelper (imperative; not watched)
  - apiGroups: ["postgres.lab.inklogic.tech"]
    resources:
      - teampostgresshadows
      - accountpostgresshadows
      - organizationpostgresshadows
      - databasepostgresshadows
      - firefighterpostgresshadows
      - backuppostgresshadows
      - restorepostgresshadows
      - postgresclusterstatuses
      - objectstorestatuses
    verbs: ["get", "create"]

  # Typed Postgres shadow CRDs — delete on entity cleanup paths only
  - apiGroups: ["postgres.lab.inklogic.tech"]
    resources:
      - teampostgresshadows
      - postgresclusterstatuses
      - objectstorestatuses
    verbs: ["delete"]

  - apiGroups: ["postgres.lab.inklogic.tech"]
    resources:
      - teampostgresshadows/status
      - accountpostgresshadows/status
      - organizationpostgresshadows/status
      - databasepostgresshadows/status
      - firefighterpostgresshadows/status
      - backuppostgresshadows/status
      - restorepostgresshadows/status
      - postgresclusterstatuses/status
      - objectstorestatuses/status
    verbs: ["update"]

  # CNPG tech cluster CRD — managed by PostgresClusterController
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "create", "update", "delete"]

  # S3 ObjectStore CRD — read by ObjectStoreResolver
  - apiGroups: ["s3.lab.inklogic.tech"]
    resources: ["objectstores"]
    verbs: ["get", "list", "watch"]

  # Kubernetes Jobs — backup/restore job lifecycle
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "create", "delete"]

  # Namespaces — bootstrap account/org credential namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create"]

  # Secrets — DB credentials and provider config (including cleanup)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "delete"]

  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # KubeOps leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}
