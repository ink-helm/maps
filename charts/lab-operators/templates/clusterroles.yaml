{{/*
clusterroles.yaml — ClusterRole for each enabled operator.
*/}}

{{- if .Values.operators.kubernetes.enabled }}
---
# ClusterRole for lab-kubernetes
# Needs broad access: core lab.inklogic.tech CRDs, shadow CRDs, Fleet, Rancher, core K8s resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lab-kubernetes
  labels:
    {{- include "lab-operators.labels" . | nindent 4 }}
    app.kubernetes.io/name: lab-kubernetes
rules:
  # Core Lab CRDs — watch + finalizer management
  - apiGroups: ["lab.inklogic.tech"]
    resources:
      - organizations
      - organizationprimers
      - accounts
      - teams
      - members
      - products
      - firefighters
      - clouds
      - environments
      - zones
      - deploymenttargets
    verbs: ["get", "list", "watch", "update", "patch"]

  # OrganizationPrimer delete — cleanup/delete path
  - apiGroups: ["lab.inklogic.tech"]
    resources: ["organizationprimers"]
    verbs: ["delete"]

  # Shared Shadow CRD — full access (Kubernetes operator creates/manages shadows)
  - apiGroups: ["lab.inklogic.tech"]
    resources: ["shadows"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Shared Shadow CRD — status sub-resource for status writes
  - apiGroups: ["lab.inklogic.tech"]
    resources: ["shadows/status"]
    verbs: ["get", "update", "patch"]

  # OperatorRegistration — bootstrap write access (no watcher; lab operator watches this resource)
  - apiGroups: ["lab.inklogic.tech"]
    resources: ["operatorregistrations"]
    verbs: ["get", "create", "update", "patch"]

  # Tech provider CRDs watched by this operator
  - apiGroups: ["kubernetes.lab.inklogic.tech", "postgres.lab.inklogic.tech"]
    resources: ["clusters", "ranchers", "postgres"]
    verbs: ["get", "list", "watch"]

  # Github provider CRD — read by GitHubTeamIdResolver during Rancher binding reconciliation
  - apiGroups: ["github.lab.inklogic.tech"]
    resources: ["githubs"]
    verbs: ["get", "list", "watch"]

  # Application CRDs — watched by ApplicationController
  - apiGroups: ["product.lab.inklogic.tech"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]

  # Database CRDs — watched by DatabaseController
  - apiGroups: ["postgres.lab.inklogic.tech"]
    resources: ["databases"]
    verbs: ["get", "list", "watch"]

  # Fleet bundles — upsert via CustomObjectUpsertHelper; delete on product/database cleanup
  - apiGroups: ["fleet.cattle.io"]
    resources: ["bundles"]
    verbs: ["get", "create", "update", "delete"]

  # Fleet GitRepos — upsert via CustomObjectUpsertHelper; delete on product/deployment-target cleanup
  - apiGroups: ["fleet.cattle.io"]
    resources: ["gitrepos"]
    verbs: ["get", "create", "update", "delete"]

  # Fleet bundle namespace mappings — upsert only (Organization/Cloud/Team controllers)
  - apiGroups: ["fleet.cattle.io"]
    resources: ["bundlenamespacemappings"]
    verbs: ["get", "create", "update"]

  # Rancher projects — reconcile lifecycle (RancherProjectReconciliation)
  - apiGroups: ["management.cattle.io"]
    resources: ["projects"]
    verbs: ["list", "create", "patch"]

  # Rancher projects — delete for account cleanup (AccountController.ReconcileDeletedAsync)
  - apiGroups: ["management.cattle.io"]
    resources: ["projects"]
    verbs: ["delete"]

  # Rancher project role bindings — reconcile lifecycle (RancherBindingApplicator)
  - apiGroups: ["management.cattle.io"]
    resources: ["projectroletemplatebindings"]
    verbs: ["list", "create", "delete"]

  # Rancher role templates — bootstrap and drift correction (RancherRoleTemplateApplicator)
  - apiGroups: ["management.cattle.io"]
    resources: ["roletemplates"]
    verbs: ["get", "create", "update"]

  # Rancher Fleet workspaces — idempotent bootstrap (FleetWorkspaceService)
  - apiGroups: ["management.cattle.io"]
    resources: ["fleetworkspaces"]
    verbs: ["get", "create"]

  # Rancher cluster role bindings — cluster-scoped RBAC (RancherClusterBindingApplicator)
  - apiGroups: ["management.cattle.io"]
    resources: ["clusterroletemplatebindings"]
    verbs: ["list", "create", "delete"]

  # Rancher management clusters — discovery for deployment-target filtering (RancherClusterCatalog)
  - apiGroups: ["management.cattle.io"]
    resources: ["clusters"]
    verbs: ["list"]

  # Rancher global roles — Fleet workspace read access bootstrap (FleetWorkspaceGlobalRoleApplicator)
  - apiGroups: ["management.cattle.io"]
    resources: ["globalroles"]
    verbs: ["get", "create"]

  # Rancher global role bindings — Fleet workspace team access (FleetWorkspaceBindingApplicator)
  - apiGroups: ["management.cattle.io"]
    resources: ["globalrolebindings"]
    verbs: ["list", "create", "delete"]

  # Rancher cluster registration tokens — targeted get of default-token (KubernetesClusterController)
  - apiGroups: ["management.cattle.io"]
    resources: ["clusterregistrationtokens"]
    verbs: ["get"]

  # Rancher provisioning clusters — managed by KubernetesClusterController (no list path)
  - apiGroups: ["provisioning.cattle.io"]
    resources: ["clusters"]
    verbs: ["get", "create", "update", "patch", "delete"]

  # Core Kubernetes resources
  - apiGroups: [""]
    resources: ["namespaces", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # Secrets — create/update/patch/delete for credential management and cleanup
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ServiceAccounts — managed by ApplicationController for workload identity (delete on app removal)
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "create", "update", "delete"]

  # Deployments — managed by ApplicationController for workload reconciliation (delete on app removal)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "create", "update", "delete"]

  # HorizontalPodAutoscalers — managed by ApplicationController for scaling (delete on app removal)
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "create", "update", "delete"]

  # Kuma mesh resources — managed by ApplicationController for service mesh registration (delete on app removal)
  - apiGroups: ["kuma.io"]
    resources: ["meshservices", "meshhttproutes"]
    verbs: ["get", "create", "update", "delete"]

  # KubeOps leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}

{{- if .Values.operators.github.enabled }}
---
# ClusterRole for lab-github
# Needs: core lab.inklogic.tech CRDs (read-only watch), github.lab.inklogic.tech provider + shadow CRDs, secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lab-github
  labels:
    {{- include "lab-operators.labels" . | nindent 4 }}
    app.kubernetes.io/name: lab-github
rules:
  # Core Lab CRDs — read-only watch (UseReadOnlyCoreWatch; no Core finalizer patches)
  - apiGroups: ["lab.inklogic.tech"]
    resources:
      - organizations
      - organizationprimers
      - accounts
      - teams
      - members
      - products
    verbs: ["get", "list", "watch"]

  # FireFighter CRD — watch + issue-driven grant/revoke lifecycle
  - apiGroups: ["lab.inklogic.tech"]
    resources: ["firefighters"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # GitHub provider CRD — read-only watch
  - apiGroups: ["github.lab.inklogic.tech"]
    resources: ["githubs"]
    verbs: ["get", "list", "watch"]

  # GithubShadow CRD — provider webhook reconciliation (GithubController)
  - apiGroups: ["github.lab.inklogic.tech"]
    resources: ["githubshadows"]
    verbs: ["get", "create"]

  - apiGroups: ["github.lab.inklogic.tech"]
    resources: ["githubshadows/status"]
    verbs: ["update"]

  # Shared Shadow CRD — tech operator shadow lifecycle (GenericShadowService)
  - apiGroups: ["lab.inklogic.tech"]
    resources: ["shadows"]
    verbs: ["get", "list", "create", "delete"]

  - apiGroups: ["lab.inklogic.tech"]
    resources: ["shadows/status"]
    verbs: ["update"]

  # OperatorRegistration — bootstrap write access (no watcher; lab operator watches this resource)
  - apiGroups: ["lab.inklogic.tech"]
    resources: ["operatorregistrations"]
    verbs: ["get", "create", "update"]

  # Secrets — reading GitHub credentials and provider config
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

  # KubeOps leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}

