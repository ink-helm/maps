{{/*
serviceaccounts.yaml — ServiceAccount for each enabled operator.
*/}}

{{- if .Values.operators.kubernetes.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab-kubernetes
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lab-operators.labels" . | nindent 4 }}
    app.kubernetes.io/name: lab-kubernetes
{{- end }}

{{- if .Values.operators.github.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab-github
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lab-operators.labels" . | nindent 4 }}
    app.kubernetes.io/name: lab-github
{{- end }}

{{- if .Values.operators.discord.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab-discord
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lab-operators.labels" . | nindent 4 }}
    app.kubernetes.io/name: lab-discord
{{- end }}

{{- if .Values.operators.lab.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
