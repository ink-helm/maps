{{/*
clusterrolebindings.yaml — ClusterRoleBinding for each enabled operator.
*/}}

{{- if .Values.operators.kubernetes.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lab-kubernetes
  labels:
    {{- include "lab-operators.labels" . | nindent 4 }}
    app.kubernetes.io/name: lab-kubernetes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lab-kubernetes
subjects:
  - kind: ServiceAccount
    name: lab-kubernetes
    namespace: {{ .Values.namespace }}
{{- end }}

