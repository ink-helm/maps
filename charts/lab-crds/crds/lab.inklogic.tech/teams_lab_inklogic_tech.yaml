apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: teams.lab.inklogic.tech
spec:
  group: lab.inklogic.tech
  names:
    kind: Team
    listKind: TeamList
    plural: teams
    singular: team
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              visibility:
                enum:
                - Private
                - Internal
                - Organization
                type: string
              isPlatform:
                type: boolean
              requireOwnerSignOff:
                nullable: true
                type: boolean
              deploymentTargets:
                items:
                  properties:
                    environment:
                      type: string
                    matchExpressions:
                      items:
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                        type: object
                      type: array
                  type: object
                nullable: true
                type: array
            type: object
        type: object
    served: true
    storage: true