apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: accounts.lab.inklogic.tech
spec:
  group: lab.inklogic.tech
  names:
    kind: Account
    listKind: AccountList
    plural: accounts
    singular: account
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              scope:
                enum:
                - Internal
                - Consultant
                - Auditor
                - Bot
                type: string
              isBot:
                type: boolean
              externalAccounts:
                items:
                  properties:
                    id:
                      type: string
                    provider:
                      type: string
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true