apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: organizations.lab.inklogic.tech
spec:
  group: lab.inklogic.tech
  names:
    kind: Organization
    listKind: OrganizationList
    plural: organizations
    singular: organization
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              teamNames:
                properties:
                  auditorTeam:
                    type: string
                  botTeam:
                    type: string
                  internalTeam:
                    type: string
                  consultantTeam:
                    type: string
                type: object
              isPrimary:
                type: boolean
              requireOwnerSignOff:
                type: boolean
              firefighterDuration:
                format: int32
                type: integer
              deploymentTargets:
                items:
                  properties:
                    environment:
                      type: string
                    matchExpressions:
                      items:
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                        type: object
                      type: array
                  type: object
                nullable: true
                type: array
            type: object
        type: object
    served: true
    storage: true