apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: products.lab.inklogic.tech
spec:
  group: lab.inklogic.tech
  names:
    kind: Product
    listKind: ProductList
    plural: products
    singular: product
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              description:
                type: string
              sourceControl:
                type: boolean
              workload:
                type: boolean
              scope:
                enum:
                - Private
                - Internal
                - Organization
                - Public
                type: string
              requireOwnerSignOff:
                nullable: true
                type: boolean
              deploymentTargets:
                items:
                  properties:
                    environment:
                      type: string
                    matchExpressions:
                      items:
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                        type: object
                      type: array
                  type: object
                nullable: true
                type: array
            type: object
        type: object
    served: true
    storage: true