apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: githubs.github.lab.inklogic.tech
spec:
  group: github.lab.inklogic.tech
  names:
    kind: Github
    listKind: GithubList
    plural: githubs
    singular: github
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              archive:
                type: boolean
              credentialsRef:
                type: string
              organisation:
                nullable: true
                type: string
              require2Fa:
                enum:
                - NotRequired
                - Required
                - RequiredSecure
                type: string
              webhook:
                nullable: true
                properties:
                  secretRef:
                    type: string
                  url:
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true